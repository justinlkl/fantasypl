name: FPL Daily Retrain

on:
  workflow_dispatch:
  schedule:
    # Run shortly after expected upstream updates (UTC)
    - cron: "15 5,17 * * *"

concurrency:
  group: fpl-daily-retrain
  cancel-in-progress: false

jobs:
  retrain-and-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download latest FPL data
        env:
          FPL_DATA_DIR: ${{ github.workspace }}/etl
        run: |
          python -m etl.sync_data

      - name: Run pipeline (features + train + predict)
        env:
          FPL_DATA_DIR: ${{ github.workspace }}/etl
          FPL_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python run_pipeline.py --no-tune

      - name: Sync latest season and predictions to DB
        env:
          FPL_DATA_DIR: ${{ github.workspace }}/etl
          FPL_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m etl.db_sync --season 2526 --sync-predictions

      - name: Validate predictions were synced
        run: |
          python - <<'PY'
          from sqlalchemy import func
          from api.database import SessionLocal
          from api.schema import Prediction

          with SessionLocal() as db:
              total = db.query(func.count(Prediction.id)).scalar() or 0
              latest = (
                  db.query(Prediction.model_run_at)
                  .order_by(Prediction.model_run_at.desc())
                  .scalar()
              )

          if total <= 0 or latest is None:
              raise SystemExit("No predictions found after workflow retrain")

          print(f"Predictions rows: {total}")
          print(f"Latest model_run_at: {latest.isoformat()}")
          PY

      - name: Upload prediction artifacts
        uses: actions/upload-artifact@v4
        with:
          name: predictions
          if-no-files-found: warn
          path: |
            artifacts/predictions_all.csv
            artifacts/predictions_top.csv
            artifacts/fixture_schedule.csv
            artifacts/fdr_table.csv

      - name: Trigger backend deploy (optional)
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        if: env.BACKEND_DEPLOY_HOOK_URL != ''
        run: |
          curl -fsS -X POST "$BACKEND_DEPLOY_HOOK_URL"

      - name: Trigger frontend deploy (optional)
        env:
          FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        if: env.FRONTEND_DEPLOY_HOOK_URL != ''
        run: |
          curl -fsS -X POST "$FRONTEND_DEPLOY_HOOK_URL"
